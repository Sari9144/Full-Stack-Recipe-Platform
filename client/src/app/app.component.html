
<nav class="pasha-nav fixed-top" [class.scrolled]="isScrolled">
  <div class="container d-flex align-items-center justify-content-between flex-wrap">
    
    <div class="pasha-logo-wrapper" routerLink="/">
      <div class="pasha-brand">PASHA</div>
      <div class="pasha-tagline">CULINARIA & ART</div>
    </div>

    <button class="menu-toggle d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#pashaMenu">
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div class="collapse navbar-collapse-custom d-lg-flex" id="pashaMenu">
      <ng-container *ngIf="authService.currentUser$ | async as u; else guestLinks">
        
        <ul class="nav-links">
          <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">דף בית</a></li>
          <li><a routerLink="/recipes" routerLinkActive="active">מתכונים</a></li>
          <li *ngIf="u.role === 'Admin' || u.role === 'Uploader'"><a routerLink="/add-recipe" routerLinkActive="active">הוספה</a></li>
          <li *ngIf="u.role === 'Admin'"><a routerLink="/admin-management" routerLinkActive="active" class="admin-special">ניהול</a></li>
          <li><a routerLink="/personal-details" routerLinkActive="active">אזור אישי</a></li>
          <li><a routerLink="/my-recipes" routerLinkActive="active">למתכונים שלי</a></li>
        </ul>

        <div class="user-actions">
          <span class="user-greet">שלום, <strong>{{ u.username }}</strong></span>
          <button class="logout-minimal" (click)="authService.logout()">התנתק</button>
        </div>
      </ng-container>

      <ng-template #guestLinks>
        <div class="guest-actions-wrapper">
          <ul class="nav-links me-4">
            <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">דף בית</a></li>
            <li><a routerLink="/recipes" routerLinkActive="active">מתכונים</a></li>
          </ul>
          <div class="auth-buttons">
            <a routerLink="/login" class="link-login">כניסה</a>
            <a routerLink="/register" class="btn-pasha-gold">הרשמה</a>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</nav>

<main class="page-content">
  <router-outlet></router-outlet>
</main>
