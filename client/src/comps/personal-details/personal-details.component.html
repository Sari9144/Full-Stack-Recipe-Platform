<div class="details-container animate-fade-in" *ngIf="userData">
  <div class="personal-card">
    <div class="card-accent-line"></div>
    
    <div class="card-header">
      <div class="user-avatar-wrapper">
        <div class="avatar-circle">
          <span class="initials">{{ userData.username[0] | uppercase }}</span>
        </div>
        <div class="status-badge">Chef Premium</div>
      </div>
      <h3 class="user-name">{{ userData.username }}</h3>
      <p class="user-title">חבר/ה בקהילת Pasha הקולינרית</p>
    </div>

    <div class="details-grid">
      <div class="detail-item">
        <label>כתובת אימייל</label>
        <div class="value-box">
          <i class="bi bi-envelope-gold"></i>
          <span>{{ userData.email }}</span>
        </div>
      </div>

      <div class="detail-item">
        <label>תאריך הצטרפות</label>
        <div class="value-box">
          <i class="bi bi-calendar-check"></i>
          <span>חבר/ה משנת 2024</span> </div>
      </div>
    </div>

    <div class="card-footer">
      <!-- <button class="btn-edit-profile">
        עריכת פרופיל <i class="bi bi-stars"></i>
      </button> -->
      <div class="card-footer">
  <app-button 
    text="עריכת פרופיל ✨" 
    variant="admin" 
  
    >
  </app-button>
</div>
    </div>
  </div>
</div>
