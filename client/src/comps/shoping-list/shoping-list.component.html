<div class="shopping-list-modal-container" (click)="close.emit()">
  <div class="shopping-card shadow-lg" (click)="$event.stopPropagation()">
    
    <div class="card-header-custom d-flex justify-content-between align-items-center">
      <h3 class="h4 m-0 fw-bold d-flex align-items-center gap-3">
        <i class="bi bi-bag-check-fill"></i> רשימת הקניות שלך
      </h3>
      <button class="btn-close-custom" (click)="close.emit()">
        <i class="bi bi-x-circle-fill"></i>
      </button>
    </div>

    <div class="card-body-custom">
      <div *ngIf="(list | keyvalue).length > 0">
        <p class="text-muted small mb-4">ריכזנו עבורך את כל המצרכים למקום אחד:</p>
        <ul class="list-group list-group-flush">
          <li *ngFor="let item of list | keyvalue" class="list-group-item d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
              <input type="checkbox" class="form-check-input">
              <span class="ingredient-name fw-semibold">{{ item.key }}</span>
            </div>
            <span class="badge amount-badge px-3 py-2 rounded-pill">{{ item.value }}</span>
          </li>
        </ul>
      </div>

      <div *ngIf="(list | keyvalue).length === 0" class="text-center py-5">
        <div class="display-1 opacity-10 mb-3">🛒</div>
        <h5 class="text-muted">הרשימה ריקה...</h5>
      </div>
    </div>

    <div class="card-footer-custom d-flex gap-2">
      <!-- <button class="btn btn-whatsapp d-flex align-items-center justify-content-center gap-2" (click)="shareToWhatsApp()">
        <i class="bi bi-whatsapp"></i> שליחה לבוואטסאפ
      </button> -->
      
      <button class="btn btn-icon-outline rounded-circle" (click)="printList()" title="הדפסה">
        <i class="bi bi-printer"></i>
      </button>

      <button class="btn btn-icon-outline rounded-circle" (click)="close.emit()" title="סגירה">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>
</div>
