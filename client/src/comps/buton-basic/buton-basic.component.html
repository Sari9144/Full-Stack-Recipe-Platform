
<button 
  [type]="type"
  [class]="'btn-pasha ' + variant" 
  [disabled]="disabled || isLoading"
  (click)="handleClick()">
  
  <div class="d-flex align-items-center justify-content-center">
    <span *ngIf="isLoading" 
          class="spinner-border spinner-border-sm" 
          role="status" 
          aria-hidden="true">
    </span>
    
    <span class="btn-text">
        {{ isLoading ? 'מעבד...' : text }}
    </span>
  </div>
</button>
