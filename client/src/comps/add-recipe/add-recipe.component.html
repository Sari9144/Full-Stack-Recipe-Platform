
<div class="recipe-add-container text-end" dir="rtl">
  <div class="recipe-card-frame">
    <h1 class="main-title-gold">יצירת מתכון חדש</h1>
    <div class="divider-gold"></div>

    <div class="row g-4 mt-2">
      <div class="col-md-6">
        <label class="pasha-label">מה שם המנה?</label>
        <input [(ngModel)]="recipe.title" name="mainTitle" placeholder="למשל: סושי שוקולד מטורף" class="pasha-input">
      </div>

      <div class="col-md-6">
        <label class="pasha-label">באיזו קטגוריה?</label>
        <select [(ngModel)]="recipe.category" name="category" class="pasha-select" required>
          <option value="" disabled selected>בחרי קטגוריה...</option>
          <option value="עיקריות">עיקריות</option>
          <option value="תוספות">תוספות</option>
          <option value="סלטים">סלטים</option>
          <option value="מרקים">מרקים</option>
          <option value="מאפים">מאפים</option>
          <option value="לחמים">לחמים</option>
          <option value="קינוחים">קינוחים</option>
          <option value="עוגות ועוגיות">עוגות ועוגיות</option>
        </select>
      </div>
    </div>

    <div class="row g-4 mt-2">
      <div class="col-md-4">
        <label class="pasha-label">סגנון</label>
        <select [(ngModel)]="recipe.type" name="recipeType" class="pasha-select">
          <option value="Parve">פרווה</option>
          <option value="Meat">בשרי</option>
          <option value="Dairy">חלבי</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="pasha-label">זמן עבודה (דקות)</label>
        <input [(ngModel)]="recipe.prep_time" name="prepTime" type="number" class="pasha-input">
      </div>
      <div class="col-md-4">
        <label class="pasha-label">שם השף/ית</label>
        <input [(ngModel)]="recipe.created_by" name="creator" placeholder="השם שלך" class="pasha-input">
      </div>
    </div>

    <hr class="pasha-hr">

    <div class="section-wrapper">
      <h4 class="section-subtitle">🛒 רכיבים</h4>
      <div *ngFor="let ing of ingredients; let i = index" class="row g-2 mb-3 align-items-center">
        <div class="col-md-5">
          <input [(ngModel)]="ing.product" [name]="'prod'+i" placeholder="מוצר" class="pasha-input-sm">
        </div>
        <div class="col-md-2">
          <input [(ngModel)]="ing.amount" [name]="'amount'+i" type="number" placeholder="כמות" class="pasha-input-sm">
        </div>
        <div class="col-md-3">
          <input [(ngModel)]="ing.unit" [name]="'unit'+i" placeholder="יחידה" class="pasha-input-sm">
        </div>
        <div class="col-md-2 text-center">
          <button type="button" class="btn-pasha-delete" (click)="removeIngredient(i)" *ngIf="ingredients.length > 1">✕</button>
        </div>
      </div>
      <button type="button" class="btn-pasha-outline" (click)="addIngredientRow()">+ הוסף רכיב</button>
    </div>

    <hr class="pasha-hr">

    <div class="section-wrapper">
      <h4 class="section-subtitle">✨ שלבי הכנה</h4>
      <div *ngFor="let step of instructions; let i = index" class="row g-2 mb-3 align-items-center">
        <div class="col-11">
          <div class="step-input-wrapper">
            <span class="step-number">{{i + 1}}</span>
            <input [(ngModel)]="step.step" [name]="'step'+i" placeholder="תארי את השלב..." class="pasha-input-sm ps-5">
          </div>
        </div>
        <div class="col-1 text-center">
          <button type="button" class="btn-pasha-delete" (click)="removeStep(i)" *ngIf="instructions.length > 1">✕</button>
        </div>
      </div>
      <button type="button" class="btn-pasha-outline" (click)="addStep()">+ הוסף שלב</button>
    </div>

    <hr class="pasha-hr">

    
    <div class="upload-section">
      <label class="pasha-label">📸 תמונה שתפתח את התיאבון</label>
      
      <div class="pasha-upload-box" 
           (click)="fileInput.click()"
           (dragover)="$event.preventDefault(); $event.stopPropagation();"
           (drop)="onFileDropped($event)">
        
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" class="d-none">

        <div *ngIf="!imagePreview" class="upload-placeholder">
          <i class="bi bi-cloud-arrow-up" style="font-size: 2.5rem; color: #c5a059;"></i>
          <p>לחצי כאן או גררי תמונה לכאן</p>
          <small>JPG, PNG בסגנון פאשה יוקרתי</small>
        </div>

        <div *ngIf="imagePreview" class="preview-container">
          <img [src]="imagePreview" class="preview-img-pasha">
          <button type="button" class="btn-remove-img" (click)="removeImage(); $event.stopPropagation()">
            הסר תמונה ✕
          </button>
        </div>
      </div>
    </div>

   
    <app-button 
  [text]="'שתפי את הקסם שלך! ✨'"
  [variant]="'primary'"
  [isLoading]="isUploading" 
  [disabled]="!recipe.title || !selectedFile"
  (btnClick)="submitRecipe()">
</app-button>
  </div>
</div>
