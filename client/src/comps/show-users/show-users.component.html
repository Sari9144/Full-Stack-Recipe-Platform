
<div class="admin-page-container px-4 py-5">
  <div class="container">
    <header class="admin-header d-flex justify-content-between align-items-end mb-5 animate__animated animate__fadeIn">
      <div>
        <h2 class="auth-title m-0 fw-bold">
          {{ currentMode === 'pending' ? 'בקשות הצטרפות ⏳' : 'קהילת השפים 👥' }}
        </h2>
        <p class="subtitle text-muted fs-5 mt-2">
           ניהול מערכת | <span class="text-gold">{{ users.length }} משתמשים רשומים</span>
        </p>
      </div>
      <button class="btn-cancel-custom" (click)="router.navigate(['/profile'])">
        <i class="bi bi-arrow-right me-2"></i> חזרה לפרופיל
      </button>
    </header>

    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4 col-xl-3 animate__animated animate__fadeInUp" 
           *ngFor="let u of users; let i = index" 
           [style.animation-delay]="i * 0.1 + 's'">
        
        <div class="glass-card user-admin-card p-4 text-center h-100 d-flex flex-column"
             [ngClass]="{
               'role-pending': u.role === 'Pending',
               'role-admin': u.role === 'Admin',
               'role-uploader': u.role === 'Uploader'
             }">
          
          <div class="flex-grow-1">
            <app-user-detail [userData]="u"></app-user-detail>
            <div class="mt-2">
              <span class="badge bg-dark text-gold border border-secondary px-3 py-1">
                {{ u.role }}
              </span>
            </div>
          </div>
          
          <div class="card-actions mt-4 pt-3 border-top border-secondary">
            <ng-container *ngIf="u.role === 'Pending'">
              <app-button 
                text="אשר גישת שף 👨‍🍳" 
                class="approve-btn-wrapper"
                (btnClick)="u.id !== undefined && approve(u.id)">
              </app-button>
            </ng-container>

            <div *ngIf="u.role === 'Reader'" class="status-badge-info">
               <span class="text-white-50 small"><i class="bi bi-eye"></i> צפייה בלבד</span>
            </div>

            <div *ngIf="u.role === 'Uploader' || u.role === 'Admin' || u.role === 'User'" class="text-success-neon fw-bold small">
              <i class="bi bi-patch-check-fill"></i> חבר קהילה מאושר
            </div>
          </div>
        </div>
      </div>

      <div class="col-12" *ngIf="users.length === 0">
        <div class="empty-state text-center py-5 rounded-4 animate__animated animate__pulse">
          <div class="display-1 mb-3 opacity-25">📁</div>
          <p class="fs-4 text-muted">השולחן נקי. אין בקשות ממתינות כרגע.</p>
        </div>
      </div>
    </div>
  </div>
</div>
