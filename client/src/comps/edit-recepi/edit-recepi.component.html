
<div class="main-page-wrapper" *ngIf="recipe">
  <div class="glass-card card-wide text-end" dir="rtl">

    <div class="d-flex justify-content-between align-items-center mb-5 no-print">
      <div class="title-area">
        <h1 class="auth-title m-0">עריכת יצירה ✨</h1>
        <div class="pasha-divider-small"></div>
      </div>
      <div class="action-buttons d-flex gap-3">
        <app-button 
          text="✕ ביטול" 
          variant="outline" 
          (btnClick)="onCancel()">
        </app-button>
        <app-button 
          text="✓ שמור שינויים" 
          variant="primary" 
          [isLoading]="isSaving"
          (btnClick)="onSave()">
        </app-button>
      </div>
    </div>

    <div class="row g-5">
      <div class="col-lg-5">
        <div class="edit-section-container">
          <label class="form-label pasha-gold-text">שם המתכון</label>
          <input type="text" [(ngModel)]="recipe.title" class="custom-input mb-4" placeholder="הכניסי שם למתכון">

          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label">סגנון</label>
              <select [(ngModel)]="recipe.type" class="custom-select">
                <option value="Parve">פרווה</option>
                <option value="Meat">בשרי</option>
                <option value="Dairy">חלבי</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">קטגוריה</label>
              <select [(ngModel)]="recipe.category" class="custom-select">
                <option value="" disabled>בחרי קטגוריה...</option>
                <option value="עיקריות">עיקריות</option>
                <option value="תוספות">תוספות</option>
                <option value="סלטים">סלטים</option>
                <option value="מרקים">מרקים</option>
                <option value="מאפים">מאפים</option>
                <option value="קינוחים">קינוחים</option>
              </select>
            </div>
          </div>

          <div class="recipe-meta-box d-flex justify-content-around align-items-center mb-4">
            <div class="d-flex align-items-center gap-2">
              <span class="fs-4">⏱️</span>
              <input type="number" [(ngModel)]="recipe.prep_time" class="meta-input">
              <span class="fw-bold">דקות הכנה</span>
            </div>
          </div>

          <label class="form-label">🛒 רכיבים (אחד בכל שורה)</label>
          <textarea [(ngModel)]="recipe.ingredients_raw" class="custom-textarea mb-4" rows="6" placeholder="1 כוס קמח..."></textarea>

          <label class="form-label">👨‍🍳 אופן ההכנה</label>
          <textarea [(ngModel)]="recipe.instructions" class="custom-textarea" rows="8" placeholder="שלבי ההכנה..."></textarea>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="main-display-wrapper mb-4 position-relative">
          <img [src]="currentImage || (baseUrl + recipe.main_image)" class="img-main-large shadow-lg" alt="Main Image">
          <div class="preview-badge">תצוגה מקדימה</div>
        </div>

        <div class="gallery-container no-print">
          <label class="form-label small mb-3 pasha-gold-text">בחרי תמונה שתופיע כראשית:</label>
          <div class="gallery-grid d-flex flex-wrap gap-2">
            <div class="gallery-item" [class.active]="currentImage === baseUrl + recipe.main_image"
              (click)="setMainImage(baseUrl + recipe.main_image)">
              <img [src]="baseUrl + recipe.main_image" class="w-100 h-100 object-fit-cover">
            </div>
            <div class="gallery-item" *ngFor="let v of recipe.gallery" [class.active]="currentImage === baseUrl + v"
              (click)="setMainImage(baseUrl + v)">
              <img [src]="baseUrl + v" class="w-100 h-100 object-fit-cover">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
