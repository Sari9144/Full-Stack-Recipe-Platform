</app-button>



          <ng-container *ngIf="user.role === 'Admin'">
            <app-button class="custom-pill-btn admin-btn" text="נהל קהילה 👥" (btnClick)="goToAdmin('all')"></app-button>
            <app-button class="custom-pill-btn admin-pending" text="אישור שפים ⏳" (btnClick)="goToAdmin('pending')"></app-button>
          </ng-container>

          <app-button *ngIf="user.role === 'Admin' || user.role === 'Uploader'"
            class="custom-pill-btn gold-btn"
            text="מתכון חדש +" 
            (btnClick)="goToAddRecipe()">
          </app-button>
        </div>
      </div>

      <div class="container mt-5">
        <div *ngIf="!showFavorites && (user.role === 'Admin' || user.role === 'Uploader')">
          <h3 class="sub-title">היצירות שלי <span class="badge-count">{{myRecipes.length}}</span></h3>
          
          <div *ngIf="myRecipes.length > 0; else noPublished" class="recipes-grid">
            <div *ngFor="let recipe of myRecipes" class="recipe-item">
              <div class="floating-actions">
                <button class="circle-btn" (click)="editRecipe(recipe.id, $event)"><i class="bi bi-pencil"></i></button>
                <button class="circle-btn" (click)="deleteRecipe(recipe.id, $event)"><i class="bi bi-trash"></i></button>
              </div>
              
              <div (click)="goToRecipe(recipe.id)" class="recipe-content-wrapper">
                <div class="img-holder">
                  <img [src]="recipe.main_image ? baseUrl + recipe.main_image : 'assets/images/placeholder.jpg'" (error)="handleImageError($event)">
                </div>
                <div class="recipe-title-text text-truncate">{{ recipe.title }}</div>
              </div>
            </div>
          </div>
          <ng-template #noPublished><p class="text-center text-white-50 py-5">טרם פורסמו מתכונים ברשותך.</p></ng-template>
        </div>

        <div *ngIf="showFavorites" class="animate__animated animate__fadeInUp">
          <h3 class="sub-title" style="border-right-color: #ff4d6d;">שמור לטעימה ❤️</h3>
          
          <div *ngIf="favorites.length > 0; else noFavs" class="recipes-grid">
            <div *ngFor="let fav of favorites" class="recipe-item">
              <div class="floating-actions">
                <button class="circle-btn fav-remove-btn" (click)="removeFromFavorites(fav.id, $event)">
                  <i class="bi bi-heartbreak-fill"></i>
                </button>
              </div>
              
              <div (click)="goToRecipe(fav.id)" class="recipe-content-wrapper">
                <div class="img-holder">
                  <img [src]="fav.main_image ? baseUrl + fav.main_image : 'assets/images/placeholder.jpg'" (error)="handleImageError($event)">
                </div>
                <div class="recipe-title-text text-truncate">{{ fav.title }}</div>
              </div>
            </div>
          </div>
          <ng-template #noFavs><p class="text-center text-white-50 py-5">רשימת המועדפים שלך ריקה.</p></ng-template>
        </div>
      </div>

    </div>
  </ng-template>

  <ng-template #loading>
    <div class="text-center py-5 mt-5">
      <div class="spinner-pasha"></div>
      <p class="mt-3 text-white-50">מסדרים את המטבח הפרטי...</p>
    </div>
  </ng-template>
</div>
