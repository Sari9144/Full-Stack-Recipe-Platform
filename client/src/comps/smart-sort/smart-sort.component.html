<div class="smart-search-card p-4 shadow-sm rounded-4 animate__animated animate__fadeIn">
  
  <div class="mb-3">
    <span class="text-gold-muted fw-bold">Smart Assistant</span>
    <h5 class="fw-bold text-white mt-1">מה יש במקרר? 🔍</h5>
  </div>

  <div class="input-group mb-3 custom-input-group">
    <input type="text" [(ngModel)]="ingredientInput" (keyup.enter)="addIngredient()" 
           class="form-control" placeholder="הוסיפו רכיב (ביצים, קמח...)">
    <button class="btn btn-primary-custom" (click)="addIngredient()">
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div class="d-flex flex-wrap gap-2 mb-3" style="min-height: 30px;">
    <span *ngFor="let ing of selectedIngredients; let i = index" 
          class="badge ingredient-tag px-3 py-2 rounded-pill animate__animated animate__zoomIn">
      {{ ing }} 
      <i class="bi bi-x ms-2 cursor-pointer remove-icon" (click)="removeIngredient(i)"></i>
    </span>
  </div>

  <button class="btn btn-search-custom w-100 py-2 rounded-pill fw-bold" 
          [disabled]="selectedIngredients.length === 0" (click)="search()">
    <span *ngIf="!isLoading">מצא לי מתכונים ✨</span>
    <div *ngIf="isLoading" class="spinner-border spinner-border-sm"></div>
  </button>

  <div *ngIf="results.length > 0" class="mt-4">
    <h6 class="text-gold-muted small mb-3 border-bottom border-secondary pb-2">תוצאות אפשריות:</h6>
    <div class="results-scroll-area">
      <div *ngFor="let res of results" 
           class="result-item d-flex justify-content-between align-items-center p-2 mb-2 rounded-3 border">
        
        <div (click)="goToRecipe(res.id)" class="flex-grow-1 cursor-pointer ps-2">
          <div class="fw-bold text-white small text-truncate" style="max-width: 120px;">{{ res.title }}</div>
          <div class="d-flex align-items-center gap-2">
            <div class="progress" style="height: 3px; width: 40px; background: rgba(255,255,255,0.1);">
              <div class="progress-bar bg-gold" [style.width]="res.matching_score + '%'"></div>
            </div>
            <small style="font-size: 0.65rem; color: #aaa;">{{ res.matching_score }}% התאמה</small>
          </div>
        </div>
        
        <button class="btn btn-sm btn-missing-custom rounded-pill py-0 px-2" 
                (click)="generateMissingIngredients(res.id, $event)">
          חסר?
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="shoppingListData && shoppingListData.length > 0" 
       class="missing-ingredients-box mt-3 p-3 rounded-3 animate__animated animate__fadeInUp">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <small class="fw-bold text-white">🛒 להשלים מהסופר:</small>
      <i class="bi bi-x-lg cursor-pointer small text-muted" (click)="shoppingListData = null"></i>
    </div>
    
    <ul class="list-group list-group-flush bg-transparent">
      <li *ngFor="let item of shoppingListData" 
          class="list-group-item bg-transparent px-0 border-0 py-1 d-flex align-items-center text-white-50" style="font-size: 0.85rem;">
        <i class="bi bi-dot text-gold me-1"></i>
        <span>{{ item.name }} <small>({{ item.amount }})</small></span>
      </li>
    </ul>
  </div>
</div>
