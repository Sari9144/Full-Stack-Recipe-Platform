

<app-shopping-list 
  *ngIf="shoppingListData" 
  [list]="shoppingListData" 
  (close)="closeShoppingList()">
</app-shopping-list>

<div class="main-layout" dir="rtl">
  
  <aside class="filters-sidebar shadow">
    <div class="text-center mb-5">
      <h2 class="text-gold fw-black" style="font-family: 'Frank Ruhl Libre';">PASHA</h2>
      <p class="small text-muted">ART OF COOKING</p>
    </div>

    <div class="filter-group mb-4">
      <label class="filter-label"><i class="bi bi-search me-2"></i>חיפוש מהיר</label>
      <input type="text" class="form-control" [(ngModel)]="filters.searchQuery" (input)="applyFilters()" placeholder="מה מתחשק לך?">
    </div>

    <div class="filter-group mb-4">
      <label class="filter-label">סגנון מנה</label>
      <select class="form-select" [(ngModel)]="filters.type" (change)="applyFilters()">
        <option value="">כל המטבחים</option>
        <option value="Meat">בשרי 🍖</option>
        <option value="Dairy">חלבי 🧀</option>
        <option value="Parve">פרווה 🥑</option>
      </select>
    </div>

    <div class="filter-group mb-4">
      <label class="filter-label">קטגוריה</label>
      <select class="form-select" [(ngModel)]="filters.category" (change)="applyFilters()">
        <option value="">כל הקטגוריות</option>
          <option value="עיקריות">עיקריות</option>
          <option value="תוספות">תוספות</option>
          <option value="סלטים">סלטים</option>
          <option value="מרקים">מרקים</option>
          <option value="מאפים">מאפים</option>
          <option value="לחמים">לחמים</option>
          <option value="קינוחים">קינוחים</option>
          <option value="עוגות ועוגיות">עוגות ועוגיות</option>
      </select>
    </div>
    <div class="filter-group mb-5">
      <label class="filter-label d-flex justify-content-between">
        <span>זמן הכנה</span>
        <span class="text-gold">{{ filters.maxTime }} דק'</span>
      </label>
      <input type="range" class="form-range custom-range" min="5" max="180" step="5" [(ngModel)]="filters.maxTime" (input)="applyFilters()">
    </div>

    <div class="mt-auto">
       <app-smart-search (resultsFound)="handleSmartSearchResults($event)"></app-smart-search>
       <button class="btn btn-link text-muted w-100 mt-3 small" (click)="resetFilters()">איפוס הגדרות</button>
    </div>
  </aside>

  <main class="content-area p-4 p-lg-5">
    <div class="mb-5 animate__animated animate__fadeIn">
      <h1 class="display-3 fw-black mb-2" style="font-family: 'Frank Ruhl Libre';">האוסף שלנו</h1>
      <div class="d-flex align-items-center gap-3">
        <div class="line" style="height: 2px; width: 50px; background: #8c6d31;"></div>
        <p class="text-muted m-0 fs-5">מציג {{ filteredRecipes.length }} יצירות קולינריות</p>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-xl-4 col-lg-6" *ngFor="let recipe of filteredRecipes">
        <div class="recipe-card shadow-sm" [class.selected-border]="selectedIds.includes(recipe.id)">
          
          <div class="selection-badge-wrapper">
            <input type="checkbox" class="recipe-checkbox" (change)="toggleRecipeSelection(recipe.id)" [checked]="selectedIds.includes(recipe.id)">
          </div>

          <button class="fav-floating shadow-sm" [class.active]="recipe.isFavorite" (click)="toggleFavorite(recipe, $event)">
            <i class="bi" [ngClass]="recipe.isFavorite ? 'bi-heart-fill' : 'bi-heart'"></i>
          </button>
          
          <div class="image-wrapper" (click)="viewDetails(recipe.id)">
            <img [src]="recipe.main_image ? baseUrl + recipe.main_image : 'assets/images/placeholder.jpg'" class="card-img-top">
          </div>

          <div class="card-body p-4">
            <div class="d-flex gap-2 mb-2">
               <small class="text-gold text-uppercase fw-bold">{{ recipe.category }}</small>
            </div>
            <h5 class="recipe-title-gallery mb-4 text-truncate">{{ recipe.title }}</h5>

            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top border-secondary">
               <span class="small text-muted"><i class="bi bi-clock me-1"></i> {{ recipe.prep_time }} דקות</span>
               <button class="btn-pasha-link" (click)="viewDetails(recipe.id)">
                  גלה עוד <i class="bi bi-arrow-left ms-1"></i>
               </button>
            </div>

            <div *ngIf="user?.role === 'Admin'" class="mt-3">
              <button class="btn btn-sm btn-outline-danger w-100 opacity-50 hover-opacity-100" (click)="deleteRecipe(recipe.id, $event)">
                <i class="bi bi-trash"></i> הסר מהאוסף
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="filteredRecipes.length === 0" class="text-center py-5">
      <i class="bi bi-egg-fried display-1 text-muted"></i>
      <h3 class="mt-3 text-muted">לא מצאנו מתכונים שמתאימים לחיפוש...</h3>
      <button class="btn btn-pasha-gold mt-3" (click)="resetFilters()">נקי הכל</button>
    </div>
  </main>
</div>

<div class="floating-action-container" *ngIf="selectedIds.length > 0 && !shoppingListData">
  <button class="btn btn-generate-list animate__animated animate__bounceInUp" (click)="generateList()">
      צור רשימת קניות ({{ selectedIds.length }})
  </button>
</div>
