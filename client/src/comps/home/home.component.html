

<div class="home-container" [class.loaded]="isLoaded">
  <header class="hero-section text-center text-white">
    <div class="hero-overlay"></div>
    <div class="container position-relative">
      <h1 class="display-1 fw-bold floating-text mb-4">Art of Cooking</h1>
      <p class="lead fs-3 mb-5">הבית של הבשלנים שרוצים יותר</p>
      <div class="d-flex justify-content-center gap-4">
        <button (click)="scrollToCategories()" class="btn btn-emerald btn-lg px-5">גלו מתכונים</button>
      </div>
    </div>
  </header>

  <div class="search-circle-wrapper">
    <div class="search-trigger-container">
      <app-smart-search></app-smart-search>
    </div>
  </div>

<section id="categories" class="container py-5 mt-5">
  <div class="text-center mb-5">
    <h2 class="display-5 fw-bold">בואו נבחר כיוון</h2>
    <div class="divider"></div>
  </div>

  <div class="row g-3 justify-content-center"> 
    <div *ngFor="let cat of staticCategories" class="col-6 col-md-3 col-lg-2">
      <div [routerLink]="['/recipes']" 
           [queryParams]="(cat.name === 'בשרי' || cat.name === 'חלבי' || cat.name === 'פרווה') 
                          ? { type: cat.typeValue } 
                          : { category: cat.name }" 
           class="category-square shadow-sm cursor-pointer">
        <span class="fs-1 mb-2">{{cat.icon}}</span>
        <h6 class="fw-bold">{{cat.name}}</h6>
      </div>
    </div>
  </div>
</section>
  <section class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5 border-bottom pb-3">
      <h2 class="m-0 fw-bold">Fast & Elegant ⚡</h2>
      <a routerLink="/recipes" class="text-gold fw-bold text-decoration-none">לכל המתכונים המהירים ←</a>
    </div>
    <div class="row g-4">
      <div class="col-md-6 col-lg-3" *ngFor="let recipe of filteredQuickRecipes">
        <div class="recipe-card-modern" [routerLink]="['/recipe', recipe.id]">
          <div class="recipe-img-container">
            <img [src]="baseUrl + recipe.main_image" class="recipe-img" (error)="handleImageError($event)">
          </div>
          <h6 class="recipe-title text-dark">{{ recipe.title }}</h6>
          <div class="d-flex justify-content-between text-muted small mt-2">
            <span><i class="bi bi-stopwatch"></i> {{ recipe.prep_time }} דקות</span>
            <span class="text-gold fw-bold">{{ recipe.type }}</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="py-5 bg-white" id="sec">
    <div class="text-center mb-5">
      <h2 class="display-6 fw-bold">השראה יומיומית</h2>
    </div>
    <div class="mosaic-grid">
      <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="mosaic-item">
        
        <div class="mosaic-blur-overlay">View Story</div>

      </div>
    </div>
  </section>

  <footer class="footer-promo py-5 text-white">
  </footer>
</div>
